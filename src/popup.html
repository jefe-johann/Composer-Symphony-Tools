<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 12px 16px;
      margin: 0;
      color: #333;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: #111;
    }

    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .setting-label {
      font-size: 12px;
    }

    .setting-description {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      border-radius: 20px;
      transition: background-color 0.2s;
    }

    .slider:before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background-color: #2563eb;
    }

    input:checked + .slider:before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <h2>Composer Symphony Tools</h2>

  <div class="setting">
    <div>
      <div class="setting-label">Keep-alive</div>
      <div class="setting-description">Maintains your Composer session</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="keepAliveToggle">
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
